<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Leadership in an Uncertain World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d1b2a;
      --navy-mid: #162032;
      --navy-light: #1c2d40;
      --gold: #c9a84c;
      --cream: #f4ede0;
      --text-light: #d6cfc3;
      --text-dim: #8a8278;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--navy); color: var(--cream); font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1.5rem 4rem; }
    .container { width: 100%; max-width: 540px; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; margin-bottom: 1.5rem; transition: color 0.2s; }
    .back-link:hover { color: var(--gold); }

    .page-header { margin-bottom: 2rem; animation: fadeUp 0.5s ease both; }
    .eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 5vw, 1.9rem); font-weight: 700; line-height: 1.2; color: var(--cream); }
    .session-meta { margin-top: 10px; display: flex; flex-direction: column; gap: 3px; }
    .session-time { font-size: 12px; color: var(--gold); letter-spacing: 0.06em; }
    .session-location { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; }
    .rule { width: 36px; height: 2px; background: var(--gold); margin-top: 16px; }

    .section-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin: 2rem 0 0.75rem; }

    .guest-card { background: var(--navy-mid); border: 1px solid rgba(201,168,76,0.15); padding: 18px 20px; margin-bottom: 1px; animation: fadeUp 0.5s ease both; }
    .guest-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid rgba(201,168,76,0.12); }
    .guest-photo { width: 104px; height: 104px; border-radius: 50%; background: var(--navy); border: 2px solid var(--gold); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 26px; color: var(--gold); overflow: hidden; box-shadow: 0 0 0 4px rgba(201,168,76,0.1); }
    .guest-photo img { width: 100%; height: 100%; object-fit: cover; }
    .guest-meta { flex: 1; }
    .guest-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--cream); line-height: 1.2; }
    .guest-title { font-size: 12px; color: var(--gold); margin-top: 3px; line-height: 1.35; opacity: 0.85; }
    .field-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
    .field-value { font-size: 13px; color: var(--text-light); line-height: 1.6; }
    .field-value.placeholder { color: var(--text-dim); font-style: italic; }

    .questions-card { background: var(--navy-mid); border: 1px solid rgba(201,168,76,0.15); padding: 18px 20px; animation: fadeUp 0.5s 0.1s ease both; }
    .question-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Playfair Display', serif; font-style: italic; font-size: 14px; color: var(--text-dim); line-height: 1.5; }
    .question-item:last-child { border-bottom: none; padding-bottom: 0; }
    .question-item.empty { color: var(--text-dim); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
