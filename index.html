<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcard Sets</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.12);
      --text: #f0ece4;
      --muted: #7a7570;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.35;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    header {
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 1.5rem 0 0;
      opacity: 0;
      animation: fadeUp 0.7s 0.15s ease forwards;
    }

    .card-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .card-list li {
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }
    .card-list li:nth-child(1) { animation-delay: 0.25s; }
    .card-list li:nth-child(2) { animation-delay: 0.38s; }
    .card-list li:nth-child(3) { animation-delay: 0.51s; }

    .card-link {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.6rem 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: background 0.25s, border-color 0.25s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card-link::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
    }

    .card-link:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .card-link:hover::before {
      transform: scaleY(1);
    }

    .card-number {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      min-width: 2.5rem;
      padding-top: 2px;
    }

    .card-text {
      flex: 1;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.3;
    }

    .card-source {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .card-arrow {
      font-size: 0.8rem;
      color: var(--muted);
      transition: color 0.25s, transform 0.25s;
    }

    .card-link:hover .card-arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s 0.65s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="eyebrow">Study Materials</p>
      <h1>Flashcard Sets</h1>
      <p class="subtitle">Select a deck to begin reviewing</p>
      <div class="divider"></div>
    </header>

    <ul class="card-list">
      <li>
        <a class="card-link" href="semaforum-future-of-capitalism.html">
          <span class="card-number">01 —</span>
          <div class="card-text">
            <div class="card-title">Future of Capitalism</div>
            <div class="card-source">Semaforum</div>
          </div>
          <span class="card-arrow">→</span>
        </a>
      </li>
      <li>
        <a class="card-link" href="bcg-ceos-take-the-lead-on-ai.html">
          <span class="card-number">02 —</span>
          <div class="card-text">
            <div class="card-title">CEOs Take the Lead on AI</div>
            <div class="card-source">BCG Lunch</div>
          </div>
          <span class="card-arrow">→</span>
        </a>
      </li>
      <li>
        <a class="card-link" href="goldman-outpacing-uncertainty.html">
          <span class="card-number">03 —</span>
          <div class="card-text">
            <div class="card-title">Outpacing Uncertainty</div>
            <div class="card-source">Goldman Sachs</div>
          </div>
          <span class="card-arrow">→</span>
        </a>
      </li>
    </ul>

    <footer>April 2026 &nbsp;·&nbsp; 3 decks available</footer>
  </div>
</body>
</html>
