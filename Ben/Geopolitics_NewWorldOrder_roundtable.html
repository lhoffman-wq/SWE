<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Semafor · Geopolitics & The New World Order · Participant Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2a;
    --navy-mid: #162032;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f4ede0;
    --text-light: #d6cfc3;
    --text-dim: #8a8278;
    --card-h: min(78vh, 560px);
    --card-w: min(92vw, 400px);
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── Header ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 12px 20px 10px;
    background: linear-gradient(to bottom, var(--navy) 80%, transparent);
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 13px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--gold);
  }
  .counter {
    font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em;
  }

  /* ── Quiz toggle ── */
  .quiz-toggle {
    display: flex; align-items: center; gap: 7px;
    cursor: pointer; padding: 4px 0;
  }
  .quiz-toggle-label {
    font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-dim);
    transition: color 0.25s;
  }
  .quiz-toggle.active .quiz-toggle-label { color: var(--gold); }
  .toggle-track {
    width: 34px; height: 19px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    position: relative;
    transition: background 0.25s, border-color 0.25s;
    flex-shrink: 0;
  }
  .quiz-toggle.active .toggle-track {
    background: rgba(201,168,76,0.25);
    border-color: var(--gold);
  }
  .toggle-thumb {
    position: absolute; top: 2px; left: 2px;
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--text-dim);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), background 0.25s;
  }
  .quiz-toggle.active .toggle-thumb {
    transform: translateX(15px);
    background: var(--gold);
  }

  /* ── Stage ── */
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding-top: 52px; padding-bottom: 80px;
  }

  /* ── Card ── */
  .card-scene {
    width: var(--card-w); height: var(--card-h);
    perspective: 1200px;
  }
  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 18px;
    overflow: hidden;
  }

  /* ── FRONT ── */
  .front {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .front .photo-wrap {
    width: 190px; height: 190px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 6px rgba(201,168,76,0.12), 0 20px 60px rgba(0,0,0,0.5);
    flex-shrink: 0;
    margin-bottom: 28px;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
  }
  .front .photo-wrap img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .front .initials {
    font-family: 'Playfair Display', serif;
    font-size: 56px; color: var(--gold);
    line-height: 1;
  }
  .front .front-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700;
    text-align: center; color: var(--cream);
    padding: 0 24px; line-height: 1.25;
  }
  .front .front-org {
    margin-top: 8px;
    font-size: 13px; color: var(--gold);
    text-align: center; padding: 0 24px;
    letter-spacing: 0.04em;
  }
  .front .tap-hint {
    position: absolute; bottom: 22px;
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* ── BACK ── */
  .back {
    transform: rotateY(180deg);
    background: linear-gradient(160deg, #1a2a3d 0%, #0f1d2c 100%);
    border: 1px solid rgba(201,168,76,0.25);
    display: flex; flex-direction: column;
    padding: 28px 26px 24px;
  }
  .back .back-name {
    font-family: 'Playfair Display', serif;
    font-size: 19px; font-weight: 700;
    color: var(--cream); line-height: 1.2;
    margin-bottom: 4px;
  }
  .back .back-title {
    font-size: 11.5px; color: var(--gold);
    line-height: 1.4; letter-spacing: 0.03em;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }
  .back .bio-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .back .bio {
    font-size: 13px; line-height: 1.6;
    color: var(--text-light); flex: 1;
    overflow-y: auto;
  }
  .divider {
    height: 1px; background: rgba(201,168,76,0.15);
    margin: 14px 0;
  }
  .back .q-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--gold); margin-bottom: 8px;
  }
  .back .question {
    font-family: 'Playfair Display', serif;
    font-style: italic; font-size: 14px;
    color: var(--cream); line-height: 1.55;
  }
  .back .question.empty {
    color: var(--text-dim); font-style: italic; font-size: 13px;
    font-family: 'DM Sans', sans-serif;
  }
  .back .tap-hint {
    margin-top: 10px;
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 0.08em; text-transform: uppercase;
    text-align: right;
  }

  /* ── Nav ── */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 24px 28px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to top, var(--navy) 70%, transparent);
  }
  .nav-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold);
    font-size: 22px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { background: rgba(201,168,76,0.15); transform: scale(0.93); }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  .progress-track {
    flex: 1; height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px; margin: 0 16px;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── Admin panel ── */
  .admin-toggle {
    position: fixed; top: 12px; right: 20px; z-index: 200;
    background: none; border: none;
    color: var(--text-dim); font-size: 18px;
    cursor: pointer; padding: 4px;
  }
  .admin-panel {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(13,27,42,0.97);
    display: none; flex-direction: column;
    padding: 24px 20px;
    overflow-y: auto;
  }
  .admin-panel.open { display: flex; }
  .admin-panel h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; color: var(--gold);
    margin-bottom: 6px;
  }
  .admin-panel p {
    font-size: 13px; color: var(--text-dim);
    margin-bottom: 20px; line-height: 1.5;
  }
  .admin-row {
    margin-bottom: 14px;
  }
  .admin-row label {
    display: block; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--gold); margin-bottom: 5px;
  }
  .admin-row select, .admin-row textarea {
    width: 100%;
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--cream); border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 10px 12px;
  }
  .admin-row textarea {
    height: 100px; resize: vertical;
  }
  .admin-save {
    padding: 13px 20px;
    background: var(--gold); color: var(--navy);
    border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 4px;
    width: 100%;
  }
  .admin-close {
    padding: 13px 20px;
    background: transparent; color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; cursor: pointer; margin-top: 8px;
    width: 100%;
  }
  .saved-msg {
    color: #7be37b; font-size: 13px;
    text-align: center; margin-top: 10px;
    opacity: 0; transition: opacity 0.3s;
  }
  .saved-msg.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">Geopolitics & The New World Order</div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="quiz-toggle" id="quiz-toggle" onclick="toggleQuizMode()" title="Hide names on front">
      <span class="quiz-toggle-label">Quiz</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
    <div class="counter" id="counter">1 / 30</div>
  </div>
</header>

<div class="stage">
  <div class="card-scene">
    <div class="card" id="card">
      <div class="face front" id="card-front"></div>
      <div class="face back" id="card-back"></div>
    </div>
  </div>
</div>

<nav>
  <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">&#8592;</button>
  <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
  <button class="nav-btn" id="next-btn" onclick="navigate(1)">&#8594;</button>
</nav>

<!-- Admin -->
<button class="admin-toggle" title="Edit questions" onclick="openAdmin()">&#9998;</button>

<div class="admin-panel" id="admin-panel">
  <h2>Add Questions</h2>
  <p>Select a participant and enter their question. Questions persist across sessions on this device.</p>
  <div class="admin-row">
    <label>Participant</label>
    <select id="admin-select"></select>
  </div>
  <div class="admin-row">
    <label>Question</label>
    <textarea id="admin-question" placeholder="Enter the question for this participant…"></textarea>
  </div>
  <button class="admin-save" onclick="saveQuestion()">Save Question</button>
  <button class="admin-close" onclick="closeAdmin()">Done</button>
  <div class="saved-msg" id="saved-msg">✓ Question saved</div>
</div>

let current = 0;
let isFlipped = false;
let questions = {};
let quizMode = false;

function toggleQuizMode() {
  quizMode = !quizMode;
  document.getElementById('quiz-toggle').classList.toggle('active', quizMode);
  // If card is showing the front, re-render to show/hide name
  renderCard();
}

// Load from storage
async function loadQuestions() {
  for (const p of PARTICIPANTS) {
    try {
      const r = await window.storage.get('q_' + p.id);
      if (r && r.value) questions[p.id] = r.value;
    } catch(e) {}
  }
  renderCard();
}

function getInitials(name) {
  return name.split(' ').filter(Boolean).slice(0,2).map(w => w[0]).join('');
}

function renderCard() {
  const p = PARTICIPANTS[current];
  const q = questions[p.id] || p.question || '';

  // Front
  const front = document.getElementById('card-front');
  const photoHtml = p.photo
    ? `<img src="data:image/jpeg;base64,${p.photo}" alt="${p.name}">`
    : `<span class="initials">${getInitials(p.name)}</span>`;
  front.innerHTML = `
    <div class="photo-wrap">${photoHtml}</div>
    ${quizMode ? '<div class="front-name" style="color:var(--text-dim);font-style:italic;font-size:15px;letter-spacing:0.05em;">Who is this?</div>' : `<div class="front-name">${p.name}</div><div class="front-org">${p.title}</div>`}
    <div class="tap-hint">Tap to reveal</div>
  `;

  // Back
  const back = document.getElementById('card-back');
  const qHtml = q
    ? `<div class="question">${q}</div>`
    : `<div class="question empty">Question not yet added</div>`;
  back.innerHTML = `
    <div class="back-name">${p.name}</div>
    <div class="back-title">${p.title}</div>
    <div class="bio-label">Background</div>
    <div class="bio">${p.bio}</div>
    <div class="divider"></div>
    <div class="q-label">Your Question</div>
    ${qHtml}
    <div class="tap-hint">↩ Flip back</div>
  `;

  // Counter & progress
  document.getElementById('counter').textContent = (current+1) + ' / ' + PARTICIPANTS.length;
  document.getElementById('progress').style.width = ((current+1)/PARTICIPANTS.length*100) + '%';
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === PARTICIPANTS.length - 1;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function navigate(dir) {
  const newIdx = current + dir;
  if (newIdx < 0 || newIdx >= PARTICIPANTS.length) return;
  // Flip back if needed
  if (isFlipped) {
    isFlipped = false;
    document.getElementById('card').classList.remove('flipped');
  }
  // Slide animation
  const card = document.getElementById('card');
  const scene = card.parentElement;
  scene.style.transform = `translateX(${dir * -60}px)`;
  scene.style.opacity = '0';
  scene.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
  setTimeout(() => {
    current = newIdx;
    renderCard();
    scene.style.transition = 'none';
    scene.style.transform = `translateX(${dir * 60}px)`;
    scene.style.opacity = '0';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        scene.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
        scene.style.transform = 'translateX(0)';
        scene.style.opacity = '1';
      });
    });
  }, 180);
}

// Touch / swipe
let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    navigate(dx < 0 ? 1 : -1);
  }
}, { passive: true });

document.getElementById('card').addEventListener('click', flipCard);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === ' ' || e.key === 'Enter') flipCard();
});

// Admin
function openAdmin() {
  const panel = document.getElementById('admin-panel');
  const sel = document.getElementById('admin-select');
  sel.innerHTML = PARTICIPANTS.map((p,i) => `<option value="${p.id}">${p.name}</option>`).join('');
  sel.value = PARTICIPANTS[current].id;
  sel.dispatchEvent(new Event('change'));
  panel.classList.add('open');
}
function closeAdmin() {
  document.getElementById('admin-panel').classList.remove('open');
  renderCard();
}
document.getElementById('admin-select').addEventListener('change', function() {
  const pid = this.value;
  document.getElementById('admin-question').value = questions[pid] || '';
});
async function saveQuestion() {
  const pid = document.getElementById('admin-select').value;
  const q = document.getElementById('admin-question').value.trim();
  questions[pid] = q;
  try {
    await window.storage.set('q_' + pid, q);
  } catch(e) {}
  const msg = document.getElementById('saved-msg');
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 2000);
}

// Init
loadQuestions();
</script>
